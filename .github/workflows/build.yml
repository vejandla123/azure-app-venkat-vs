name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  DOTNET_VERSION: '6.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Verify HTML files
        run: find . -name "*.html" -type f
      
      - name: Verify CSS files
        run: find . -name "*.css" -type f
      
      - name: Verify JavaScript files
        run: find . -name "*.js" -type f
      
      - name: Restore .NET dependencies
        run: dotnet restore azure-app-venkat-vs/azure-app-venkat-vs.csproj
      
      - name: Build .NET project
        run: dotnet build azure-app-venkat-vs/azure-app-venkat-vs.csproj --configuration Release --no-restore

      - name: Publish .NET project
        run: dotnet publish azure-app-venkat-vs/azure-app-venkat-vs.csproj -c Release -o publish
      
      - name: Run .NET tests
        run: dotnet test --configuration Release --no-build --verbosity normal
      
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            publish
